name: XcodeMCPTap
options:
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  projectFormat: xcode16_0
  defaultSourceDirectoryType: syncedFolder

configFiles:
  Debug: BuildConfig/Identity.xcconfig
  Release: BuildConfig/Identity.xcconfig

settings:
  base:
    SWIFT_VERSION: "6"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    DEVELOPMENT_TEAM: GU3RT64VWG
  configs:
    Release:
      # Prevent get-task-allow from being injected in Release so the signed binary
      # passes notarization. Debug keeps the default (YES) so lldb can attach.
      CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
      OTHER_CODE_SIGN_FLAGS: --timestamp
      # Enable post-link stripping; keep nlist for crash-log symbolication.
      DEPLOYMENT_POSTPROCESSING: YES
      STRIP_STYLE: debugging
      ASSETCATALOG_COMPILER_OPTIMIZATION: space

packages:
  XcodeMCPTapPackage:
    path: .

targets:
  XcodeMCPTap:
    type: application
    platform: macOS
    sources:
      - path: App
        excludes:
          - xcmcptap
          - xcmcptapd
          - xcmcptap-helper
      - path: $(DERIVED_FILE_DIR)/BuildConfig.swift
        type: file
        optional: true
    preBuildScripts:
      - name: Generate BuildConfig.swift
        script: "$SRCROOT/scripts/gen-build-config.sh"
        inputFiles:
          - $(SRCROOT)/BuildConfig/Identity.xcconfig
          - $(SRCROOT)/scripts/gen-build-config.sh
        outputFiles:
          - $(DERIVED_FILE_DIR)/BuildConfig.swift
        basedOnDependencyAnalysis: true
      - name: Install bundle LaunchAgent + LaunchDaemon plists
        script: "$SRCROOT/scripts/install-bundle-plists.sh"
        inputFiles:
          - $(SRCROOT)/BuildConfig/Identity.xcconfig
          - $(SRCROOT)/BuildConfig/agent.plist.template
          - $(SRCROOT)/BuildConfig/helper.plist.template
          - $(SRCROOT)/scripts/install-bundle-plists.sh
        # No outputFiles: the script writes into ${BUILT_PRODUCTS_DIR}/
        # under a name only known at build time, so we cannot pre-declare
        # them. basedOnDependencyAnalysis=false forces every-build re-run,
        # which is cheap (a sed + a few KB written to the bundle).
        basedOnDependencyAnalysis: false
    dependencies:
      - package: XcodeMCPTapPackage
        product: XcodeMCPTapUI
      - target: xcmcptapd
        embed: true
        codeSign: false
        copy:
          destination: executables
      - target: xcmcptap
        embed: true
        codeSign: false
        copy:
          destination: executables
      - target: xcmcptap-helper
        embed: true
        codeSign: false
        copy:
          destination: executables
    info:
      path: App/Info.plist
      properties:
        CFBundleIconName: $(XCMCPTAP_ICON_NAME)
        CFBundleName: $(XCMCPTAP_APP_DISPLAY_NAME)
        CFBundleDisplayName: $(XCMCPTAP_APP_DISPLAY_NAME)
    settings:
      base:
        ENABLE_HARDENED_RUNTIME: YES

  xcmcptap:
    type: tool
    platform: macOS
    sources:
      - path: App/xcmcptap
      - path: $(DERIVED_FILE_DIR)/BuildConfig.swift
        type: file
        optional: true
    preBuildScripts:
      - name: Generate BuildConfig.swift
        script: "$SRCROOT/scripts/gen-build-config.sh"
        inputFiles:
          - $(SRCROOT)/BuildConfig/Identity.xcconfig
          - $(SRCROOT)/scripts/gen-build-config.sh
        outputFiles:
          - $(DERIVED_FILE_DIR)/BuildConfig.swift
        basedOnDependencyAnalysis: true
    dependencies:
      - package: XcodeMCPTapPackage
        product: XcodeMCPTapClient
    settings:
      base:
        PRODUCT_NAME: xcmcptap
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: YES

  xcmcptapd:
    type: tool
    platform: macOS
    sources:
      - path: App/xcmcptapd
      - path: $(DERIVED_FILE_DIR)/BuildConfig.swift
        type: file
        optional: true
    preBuildScripts:
      - name: Generate BuildConfig.swift
        script: "$SRCROOT/scripts/gen-build-config.sh"
        inputFiles:
          - $(SRCROOT)/BuildConfig/Identity.xcconfig
          - $(SRCROOT)/scripts/gen-build-config.sh
        outputFiles:
          - $(DERIVED_FILE_DIR)/BuildConfig.swift
        basedOnDependencyAnalysis: true
    dependencies:
      - package: XcodeMCPTapPackage
        product: XcodeMCPTapService
    settings:
      base:
        PRODUCT_NAME: xcmcptapd
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: YES

  xcmcptap-helper:
    type: tool
    platform: macOS
    sources:
      - path: App/xcmcptap-helper
      - path: $(DERIVED_FILE_DIR)/BuildConfig.swift
        type: file
        optional: true
    preBuildScripts:
      - name: Generate BuildConfig.swift
        script: "$SRCROOT/scripts/gen-build-config.sh"
        inputFiles:
          - $(SRCROOT)/BuildConfig/Identity.xcconfig
          - $(SRCROOT)/scripts/gen-build-config.sh
        outputFiles:
          - $(DERIVED_FILE_DIR)/BuildConfig.swift
        basedOnDependencyAnalysis: true
    dependencies:
      - package: XcodeMCPTapPackage
        product: XcodeMCPTapHelper
    settings:
      base:
        PRODUCT_NAME: xcmcptap-helper
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: YES

  XcodeMCPTapUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - UITests/XcodeMCPTapUITests
    dependencies:
      - target: XcodeMCPTap
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: alfred.xcmcptap.uitests
        TEST_TARGET_NAME: XcodeMCPTap
        GENERATE_INFOPLIST_FILE: YES
