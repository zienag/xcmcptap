name: XcodeMCPTap
options:
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  projectFormat: xcode16_0
  defaultSourceDirectoryType: syncedFolder

settings:
  base:
    SWIFT_VERSION: "6"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    DEVELOPMENT_TEAM: GU3RT64VWG
  configs:
    Release:
      # Prevent get-task-allow from being injected in Release so the signed binary
      # passes notarization. Debug keeps the default (YES) so lldb can attach.
      CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
      OTHER_CODE_SIGN_FLAGS: --timestamp
      # Enable post-link stripping; keep nlist for crash-log symbolication.
      DEPLOYMENT_POSTPROCESSING: YES
      STRIP_STYLE: debugging
      ASSETCATALOG_COMPILER_OPTIMIZATION: space

packages:
  XcodeMCPTapPackage:
    path: .

targets:
  XcodeMCPTap:
    type: application
    platform: macOS
    sources:
      - path: App
        excludes:
          - xcmcptap
          - xcmcptapd
          - xcmcptap-helper
          - LaunchAgents
          - LaunchDaemons
      - path: App/LaunchAgents/alfred.xcmcptap.plist
        buildPhase:
          copyFiles:
            destination: wrapper
            subpath: Contents/Library/LaunchAgents
      - path: App/LaunchDaemons/alfred.xcmcptap.helper.plist
        buildPhase:
          copyFiles:
            destination: wrapper
            subpath: Contents/Library/LaunchDaemons
    dependencies:
      - package: XcodeMCPTapPackage
        product: XcodeMCPTapUI
      - target: xcmcptapd
        embed: true
        codeSign: false
        copy:
          destination: executables
      - target: xcmcptap
        embed: true
        codeSign: false
        copy:
          destination: executables
      - target: xcmcptap-helper
        embed: true
        codeSign: false
        copy:
          destination: executables
    info:
      path: App/Info.plist
      properties:
        CFBundleIconName: AppIcon
        CFBundleName: Xcode MCP Tap
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: alfred.xcmcptap
        PRODUCT_NAME: Xcode MCP Tap
        ENABLE_HARDENED_RUNTIME: YES

  xcmcptap:
    type: tool
    platform: macOS
    sources:
      - App/xcmcptap
    dependencies:
      - package: XcodeMCPTapPackage
        product: XcodeMCPTapClient
    settings:
      base:
        PRODUCT_NAME: xcmcptap
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: YES

  xcmcptapd:
    type: tool
    platform: macOS
    sources:
      - App/xcmcptapd
    dependencies:
      - package: XcodeMCPTapPackage
        product: XcodeMCPTapService
    settings:
      base:
        PRODUCT_NAME: xcmcptapd
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: YES

  xcmcptap-helper:
    type: tool
    platform: macOS
    sources:
      - App/xcmcptap-helper
    dependencies:
      - package: XcodeMCPTapPackage
        product: XcodeMCPTapHelper
    settings:
      base:
        PRODUCT_NAME: xcmcptap-helper
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: YES

  XcodeMCPTapUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - UITests/XcodeMCPTapUITests
    dependencies:
      - target: XcodeMCPTap
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: alfred.xcmcptap.uitests
        TEST_TARGET_NAME: XcodeMCPTap
        GENERATE_INFOPLIST_FILE: YES
