name: XcodeMCPTap
options:
  deploymentTarget:
    macOS: "26.0"

settings:
  base:
    SWIFT_VERSION: "6"
    DEVELOPMENT_TEAM: GU3RT64VWG

localPackages:
  - .

targets:
  XcodeMCPTap:
    type: application
    platform: macOS
    sources:
      - App
    dependencies:
      - package: XcodeMCPTap
        product: XcodeMCPTapShared
      - package: XcodeMCPTap
        product: xcmcptapd
        link: false
        embed: true
        copy:
          destination: executables
      - package: XcodeMCPTap
        product: xcmcptap
        link: false
        embed: true
        copy:
          destination: executables
    info:
      path: App/Info.plist
      properties:
        CFBundleIconName: AppIcon
        CFBundleName: Xcode MCP Tap
        LSUIElement: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.multivibe.xcmcptap
        PRODUCT_NAME: Xcode MCP Tap
        ENABLE_HARDENED_RUNTIME: YES
